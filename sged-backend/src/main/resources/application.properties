# SGED Backend - Sistema Integral de Gestión Académica y Bienestar Estudiantil
spring.application.name=sged-backend

# Server Configuration
server.port=8081

# Database Configuration - H2 in-memory for local development
spring.datasource.url=jdbc:h2:mem:sgeddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 console (dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=tu-clave-secreta-super-segura-aqui-cambiar-en-produccion-1234567890123456
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.root=INFO
logging.level.cl.duocuc.sged=DEBUG
